<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca Islámica</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/tuff.png">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f4f0; }
        .header { margin-top: 50px; }
        .header img { max-width: 200px; height: auto; }
        
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            background-color: #8da399;
            color: white;
            padding: 40px;
            border-radius: 15px;
            width: 200px;
            text-decoration: none;
            transition: transform 0.3s, background-color 0.3s;
            display: block;
        }
        
        .card:hover {
            transform: scale(1.05);
            background-color: #728a7f;
        }

        .card img { width: 50px; height: 50px; border-radius: 50%; margin-bottom: 10px; }
        .card h2 { margin-top: 5px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="header">
        <img src="img/biblioteca.png" alt="Logo">
        <h1>Libreria Islamica</h1>
        <h3>Hecho por ''Casa del Conocimiento''</h3>
        <p>مكتبة إسلامية</p>
    </div>

    <!-- Botón de Discord -->
    <div style="display: flex; justify-content: center; margin-top: 30px;">
        <a href="https://discord.gg/fg6HFux9PH" class="card">
            <img src="img/logo.jpg" alt="Discord">
            <h2>DISCORD</h2>
        </a>
    </div>

    <!-- Apartados -->
    <div class="container">
        <a href="conocimiento.html" class="card">
            <h2>CONOCIMIENTO</h2>
        </a>

        <a href="contenido.html" class="card">
            <h2>CONTENIDO</h2>
        </a>

        <a href="evidencias.html" class="card">
            <h2>EVIDENCIAS</h2>
        </a>

        <a href="defensa.html" class="card">
            <h2>DEFENSA</h2>
        </a>

        <a href="personajes.html" class="card">
            <h2>PERSONAJES</h2>
        </a>
    </div>

</body>
</html>
